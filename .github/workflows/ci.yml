name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; jobs elevate only what they need.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "0.11.7"
          enable-cache: true
      - name: Install
        run: uv sync --group dev --python ${{ matrix.python-version }}
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        run: uv run pytest -q
      - name: Build distribution
        run: uv build

  spec-drift:
    # The shipped OpenAPI must be reproducible from the committed cache.
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "0.11.7"
      - name: Rebuild spec from committed cache (offline, deterministic)
        run: uv run python -m tools.build --offline
      - name: Assert no drift in the shipped spec
        run: |
          git diff --exit-code -- spec/freebox-openapi.json \
            || { echo "::error::spec/freebox-openapi.json drifted. Run 'python -m tools.build --offline' and commit."; exit 1; }

  supply-chain-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "0.11.7"
      - name: Dependency vulnerability audit
        run: uvx pip-audit --progress-spinner off .
        continue-on-error: true
