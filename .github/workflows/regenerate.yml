name: Regenerate spec

# Re-scrape the official Freebox docs and rebuild the OpenAPI spec
# deterministically (pure Python, no AI). If the generated spec changed and the
# tests pass, bump the version, commit, tag, and release — fully hands-off.
#
# IMPORTANT: dev.freebox.fr (Free/Iliad) silently drops connections from
# GitHub-hosted runner IPs, so the scrape MUST run on a self-hosted runner on a
# France-reachable network (e.g. an always-on Raspberry Pi). Register such a
# runner, then set the repo variable REGEN_RUNNER to its label and re-enable the
# schedule below. Until then this runs only on manual dispatch and will fail on
# GitHub-hosted runners at the scrape step. The release pipeline it calls runs on
# GitHub-hosted runners and is unaffected.
on:
  # schedule:
  #   - cron: "17 4 * * 1" # Mondays 04:17 UTC — re-enable once REGEN_RUNNER is set
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: regenerate
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ${{ vars.REGEN_RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: write # commit + tag the regenerated spec
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.7"
      - name: Install
        run: uv sync --group dev
      - name: Regenerate from live docs
        run: uv run python -m tools.build
      - name: Detect spec change
        id: diff
        run: |
          if git diff --quiet -- spec/freebox-openapi.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No API change."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Spec changed:"; git --no-pager diff --stat -- spec
          fi
      - name: Test regenerated spec
        if: steps.diff.outputs.changed == 'true'
        run: uv run pytest -q
      - name: Bump version
        if: steps.diff.outputs.changed == 'true'
        id: bump
        run: echo "version=$(uv run python -m tools.bump)" >> "$GITHUB_OUTPUT"
      - name: Commit, tag, push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: regenerate Freebox API spec → v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }} --follow-tags

  release:
    needs: regenerate
    if: needs.regenerate.outputs.changed == 'true'
    # GITHUB_TOKEN pushes don't trigger the tag workflow, so we call it directly.
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    with:
      ref: v${{ needs.regenerate.outputs.version }}
