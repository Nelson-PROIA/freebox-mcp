name: Dependabot auto-merge

# When CI succeeds on a Dependabot PR, merge it. Runs *after* CI (workflow_run)
# rather than via branch protection, because requiring status checks on `main`
# would also block the regeneration cron's direct push from the Pi.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Merge the Dependabot PR (CI already passed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD: ${{ github.event.workflow_run.head_branch }}
        run: |
          pr=$(gh pr list --repo "$REPO" --head "$HEAD" --state open --json number --jq '.[0].number // empty')
          if [ -z "$pr" ]; then echo "No open PR for $HEAD"; exit 0; fi
          echo "Auto-merging PR #$pr ($HEAD)"
          gh pr merge "$pr" --repo "$REPO" --squash --delete-branch
